# =============================================================================
# ArXiv Reader (论文检索阅读) 工具配置
# =============================================================================
# 通过 ArXiv API 检索学术论文，获取标题、作者、摘要、PDF 链接等元数据。
# =============================================================================

arxiv_reader:
  name: "arxiv_reader"
  description: "通过 ArXiv API 检索并读取学术论文摘要与元数据"

  # 总开关
  enabled: true

  # ArXiv API 端点
  api_endpoint: "http://export.arxiv.org/api/query"

  # ---------------------------------------------------------------------------
  # 查询参数
  # ---------------------------------------------------------------------------
  # 单次查询最多返回的论文数
  max_papers: 5
  # 结果排序方式：relevance / lastUpdatedDate / submittedDate
  sort_by: "relevance"
  # 排序顺序：ascending / descending
  sort_order: "descending"
  # 默认搜索字段：all / title / author / abstract / comment / journal_reference / subject_category
  search_field: "all"

  # ---------------------------------------------------------------------------
  # 内容处理参数
  # ---------------------------------------------------------------------------
  # 论文摘要最大 token 数（过长时截断）
  abstract_max_tokens: 1024
  # 是否获取并解析 PDF 前 N 页（实验性功能，需额外依赖）
  fetch_pdf_preview: false
  pdf_preview_pages: 2
  # 是否提取论文中的关键实体（方法、数据集、指标）
  extract_entities: false

  # ---------------------------------------------------------------------------
  # 网络与缓存参数
  # ---------------------------------------------------------------------------
  # API 请求超时（秒）
  timeout_seconds: 20
  # 失败重试次数
  max_retries: 3
  # 重试间隔（秒，含指数退避）
  retry_delay: 2.0
  # 是否启用结果缓存
  cache_enabled: true
  cache_ttl_seconds: 86400

  # ---------------------------------------------------------------------------
  # 类别过滤（可选，用于限定搜索领域）
  # ---------------------------------------------------------------------------
  # 允许搜索的 ArXiv 类别白名单，空列表表示不限制
  allowed_categories:
    - "cs.AI"
    - "cs.CL"
    - "cs.LG"
    - "cs.IR"
    - "stat.ML"
