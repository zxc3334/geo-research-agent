# =============================================================================
# Notepad (笔记工具) 配置
# =============================================================================
# Agent 的私人草稿纸，用于记录中间结论、待办事项和搜索策略。
# 纯内存实现（session 级），不持久化。
# =============================================================================

notepad:
  name: "notepad"
  description: "Agent 个人草稿纸，记录中间结论与待办事项"

  # 总开关
  enabled: true

  # ---------------------------------------------------------------------------
  # 笔记分类（category）建议值
  # ---------------------------------------------------------------------------
  # 这些只是建议，Agent 可以使用任意字符串作为 category。
  suggested_categories:
    - "conclusion"   # 已确认的结论
    - "todo"         # 待办事项（需要后续验证）
    - "question"     # 未回答的疑问
    - "source"       # 重要来源记录
    - "strategy"     # 搜索策略/计划

  # ---------------------------------------------------------------------------
  # 使用建议
  # ---------------------------------------------------------------------------
  # 1. 每完成一轮关键搜索，使用 write 记录核心发现。
  # 2. 发现新的待验证点时，使用 write(category="todo") 记录。
  # 3. 长时程研究（>5 轮）中，每 3 轮使用 read 回顾一次笔记。
  # 4. 避免笔记膨胀：单次 read 默认只返回最近 10 条。
