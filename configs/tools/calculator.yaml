# =============================================================================
# Calculator (计算器) 工具配置
# =============================================================================
# 轻量、安全、快速的数学表达式计算器。
# 适合简单算术，复杂场景请使用 code_sandbox。
# =============================================================================

calculator:
  name: "calculator"
  description: "安全地执行数学表达式计算"

  # 总开关
  enabled: true

  # ---------------------------------------------------------------------------
  # 安全限制
  # ---------------------------------------------------------------------------
  # 允许的操作符：+, -, *, /, **, %, 一元 +, 一元 -
  # 允许的函数：abs, round, max, min, sum, len, sqrt, sin, cos, tan,
  #            log, log10, exp, ceil, floor, factorial, mean, median,
  #            stdev, variance
  # 允许的常量：pi, e
  #
  # 严禁：import, eval, exec, 文件操作, 网络请求等
