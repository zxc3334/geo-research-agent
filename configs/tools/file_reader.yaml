# =============================================================================
# File Reader (文件阅读器) 工具配置
# =============================================================================
# 读取本地文件并转换为 LLM 可消费的文本格式。
# =============================================================================

file_reader:
  name: "file_reader"
  description: "读取本地文件（.txt/.md/.pdf/.csv/.json/.docx）并返回文本内容"

  # 总开关
  enabled: true

  # ---------------------------------------------------------------------------
  # 安全参数
  # ---------------------------------------------------------------------------
  # 允许读取的根目录（sandbox 模式）。
  # 设置为 null 表示不限制（生产环境强烈建议设置）。
  allowed_base_dir: null
  # 最大文件大小（字节）
  max_file_size: 10485760  # 10 MB

  # ---------------------------------------------------------------------------
  # 格式特定参数
  # ---------------------------------------------------------------------------
  # CSV 预览行数
  csv_preview_rows: 20
  # JSON 最大递归深度
  json_max_depth: 3

  # ---------------------------------------------------------------------------
  # 支持格式与依赖
  # ---------------------------------------------------------------------------
  # .txt / .md  → 无需额外依赖
  # .pdf        → pdfplumber（推荐）或 PyPDF2
  # .csv        → pandas
  # .json       → 标准库 json
  # .docx       → python-docx
  #
  # 安装命令：
  #   pip install pdfplumber pandas python-docx
