# =============================================================================
# Web Search (网络搜索) 工具配置
# =============================================================================
# 支持多种搜索后端：mock（本地模拟）、serpapi、bing、google_custom_search
# =============================================================================

web_search:
  name: "web_search"
  description: "通过网络搜索引擎获取实时网页信息"

  # 总开关
  enabled: true

  # 后端类型：mock / serpapi / bing / google_custom_search
  backend: "mock"

  # ---------------------------------------------------------------------------
  # Mock 模式配置（无真实 API 时使用，用于快速调试）
  # ---------------------------------------------------------------------------
  mock:
    # 是否启用 mock
    enabled: true
    # mock 数据文件路径（JSONL 格式，每行一个预设结果）
    mock_data_path: "data/mock_search_results.jsonl"
    # 当无预设结果时，是否返回随机生成的占位摘要
    fallback_to_random: true
    # 随机摘要模板池
    random_templates:
      - "关于 {query} 的最新研究表明，这一领域正在快速发展。"
      - "{query} 是一个复杂的话题，涉及多个学科的交叉研究。"
      - "根据权威来源，{query} 的关键要点包括技术创新和应用落地。"

  # ---------------------------------------------------------------------------
  # SerpApi 配置（真实搜索后端示例）
  # ---------------------------------------------------------------------------
  serpapi:
    api_key: "${SERPAPI_KEY}"
    engine: "google"
    # 搜索区域代码
    gl: "us"
    # 界面语言
    hl: "en"
    # 安全搜索级别：active / moderate / off
    safe: "active"

  # ---------------------------------------------------------------------------
  # 通用参数
  # ---------------------------------------------------------------------------
  # 单次搜索返回的最大结果数
  max_results: 10
  # 搜索结果摘要最大 token 数（过长时截断）
  snippet_max_tokens: 512
  # 搜索结果超时（秒）
  timeout_seconds: 15
  # 失败重试次数
  max_retries: 2
  # 重试间隔（秒）
  retry_delay: 1.0
  # 是否缓存搜索结果（TTL 秒）
  cache_enabled: true
  cache_ttl_seconds: 3600
