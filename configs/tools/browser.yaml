# =============================================================================
# Browser (网页阅读器) 工具配置
# =============================================================================
# 打开 URL 并提取网页正文，是 web_search 的下游工具。
# web_search 负责"找到链接"，browser 负责"读取原文"。
# =============================================================================

browser:
  name: "browser"
  description: "打开 URL 并提取网页正文内容"

  # 总开关
  enabled: true

  # ---------------------------------------------------------------------------
  # 网络参数
  # ---------------------------------------------------------------------------
  # HTTP 请求超时（秒）
  timeout_seconds: 15
  # User-Agent 字符串
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  # 是否跟随重定向
  follow_redirects: true

  # ---------------------------------------------------------------------------
  # 内容提取参数
  # ---------------------------------------------------------------------------
  # 默认返回的最大字符数（防止超长页面占满上下文）
  max_chars: 8000
  # 噪声标签（提取时直接移除的 HTML 标签）
  noise_tags:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - "aside"
    - "noscript"
    - "iframe"
    - "svg"

  # ---------------------------------------------------------------------------
  # 失败处理
  # ---------------------------------------------------------------------------
  # 请求失败重试次数
  max_retries: 2
  # 重试间隔（秒，含指数退避）
  retry_delay: 1.0

  # ---------------------------------------------------------------------------
  # 依赖说明
  # ---------------------------------------------------------------------------
  # 需要安装 beautifulsoup4 进行 HTML 解析：
  #   pip install beautifulsoup4
  # 若未安装，会自动降级为简单正则提取（效果较差）。
