# GeoResearch Agent MVP config.
# This config keeps the stable baseline runtime settings while enabling the
# GIS / remote-sensing planner domain.

system:
  name: "GeoResearchAgent-MVP"
  version: "0.1.0"
  log_level: "INFO"
  work_dir: "./outputs"

model:
  default_profile: "solver"
  providers:
    deepseek:
      adapter: "openai_compatible"
      env_prefix: "DEEPSEEK"
      default_model: "deepseek-chat"
      default_base_url: "https://api.deepseek.com/v1"
  profiles:
    planner:
      provider: "deepseek"
      temperature: 0.2
      top_p: 1.0
      max_tokens: 4096
    solver:
      provider: "deepseek"
      temperature: 0.5
      top_p: 1.0
      max_tokens: 2048
    summarizer:
      provider: "deepseek"
      temperature: 0.4
      top_p: 1.0
      max_tokens: 4096
    compressor:
      provider: "deepseek"
      temperature: 0.1
      top_p: 1.0
      max_tokens: 1024
  module_profiles:
    planner: "planner"
    solver: "solver"
    summarizer: "summarizer"
    compressor: "compressor"

orchestrator:
  max_concurrent: 2
  global_timeout_seconds: 420
  max_replan_rounds: 1
  max_sub_questions: 6
  max_subagent_retries: 1

planner:
  domain: "geo_remote_sensing"
  max_search_rounds_per_subagent: 3
  enable_replan: true
  enable_completeness_check: false

agents:
  researcher:
    tool_loop:
      max_turns: 10
      max_tool_calls_before_summary: 3
      context_budget_tokens: 12000
      compact_threshold_ratio: 0.70
      compact_tool_result_chars: 1500
      chars_per_token: 3.5
  summarizer:
    compact:
      context_budget_tokens: 24000
      compact_threshold_ratio: 0.70
      compact_result_chars: 1800
      compact_evidence_items_per_result: 6
      chars_per_token: 3.5

compressor:
  max_context_length: 12000
  output_reserve_tokens: 1024
  l1_threshold: 0.6
  l2_threshold: 0.8
  l3_threshold: 0.95
  embedding_model: "all-MiniLM-L6-v2"
  enable_multilevel: true

memory:
  db_path: "data/geo_mvp_memory.db"
  max_entries: 1000
  similarity_threshold_dup: 0.92
  similarity_threshold_conflict: 0.65
  evict_interval: 100
  enable_vector_index: true

adversarial:
  enabled: false
  max_rounds: 1
  score_threshold: 9.5
  delta_threshold: 0.2
  save_logs: false

evolution:
  enabled: false

tools:
  web_search:
    enabled: true
    mock_mode: true
    max_results: 5
    snippet_max_tokens: 256
  arxiv_reader:
    enabled: true
    max_papers: 3
    abstract_max_tokens: 512
  code_sandbox:
    enabled: false
    timeout_seconds: 10
    max_memory_mb: 512
  geo_registry:
    enabled: true
