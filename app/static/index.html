<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoResearch Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; margin-bottom: 30px; }
        header h1 { font-size: 2em; color: #38bdf8; }
        header p { color: #94a3b8; margin-top: 8px; }
        nav { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; }
        nav a { color: #94a3b8; text-decoration: none; padding: 6px 16px; border-radius: 6px; font-size: 0.9em; }
        nav a:hover { background: #1e293b; color: #e2e8f0; }
        nav a.active { background: #38bdf8; color: #0f172a; font-weight: 600; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid #334155; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em; }
        textarea { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 1em; resize: vertical; }
        textarea:focus { outline: none; border-color: #38bdf8; }
        .row { display: flex; gap: 16px; align-items: end; }
        .row > * { flex: 1; }
        select, input[type="number"] { width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 1em; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 14px 32px; border-radius: 8px; font-size: 1.1em; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #7dd3fc; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .status { padding: 12px 16px; border-radius: 8px; margin: 16px 0; font-size: 0.95em; }
        .status.running { background: #1e3a5f; border-left: 4px solid #38bdf8; }
        .status.done { background: #14532d; border-left: 4px solid #4ade80; }
        .status.error { background: #7f1d1d; border-left: 4px solid #f87171; }
        .report { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 24px; margin-top: 16px; white-space: pre-wrap; font-family: 'Georgia', serif; max-height: 600px; overflow-y: auto; }
        .evidence { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        .evidence .badge { padding: 8px 16px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .badge.verified { background: #14532d; color: #4ade80; }
        .badge.evidence_backed { background: #1e3a5f; color: #38bdf8; }
        .badge.speculative { background: #78350f; color: #fbbf24; }
        .badge.rejected { background: #7f1d1d; color: #f87171; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #38bdf8; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .examples { margin-top: 12px; }
        .examples button { background: #334155; color: #94a3b8; font-size: 0.85em; padding: 8px 14px; margin: 4px; font-weight: 400; }
        .examples button:hover { background: #475569; color: #e2e8f0; }
        #report-content { white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 GeoResearch Agent</h1>
            <p>AI 深度研究 Agent — 自动搜索官方文档、学术论文和领域知识库，生成带证据分级的研究报告</p>
        </header>

        <nav>
            <a href="/" class="active">🔍 研究</a>
            <a href="/wiki.html">📚 知识库</a>
            <a href="/docs" target="_blank">📖 API 文档</a>
        </nav>

        <div class="card">
            <label for="query">研究问题</label>
            <textarea id="query" rows="3" placeholder="例如：如何利用 Landsat 和 Sentinel-2 数据进行城市热岛效应分析？"></textarea>
            <div class="examples">
                <button onclick="setQuery('如何利用 Landsat 和 Sentinel-2 数据进行城市热岛效应分析？')">城市热岛分析</button>
                <button onclick="setQuery('对比 Sentinel-2 和 Landsat 8 在城市绿地监测中的适用性')">绿地监测对比</button>
                <button onclick="setQuery('面向山区城镇的应急疏散的GIS交通方向有哪些？')">应急疏散 GIS</button>
            </div>
            <div class="row" style="margin-top: 16px;">
                <div>
                    <label for="domain">领域</label>
                    <select id="domain">
                        <option value="geo_rs" selected>GIS / 遥感</option>
                        <option value="general">通用</option>
                    </select>
                </div>
                <div>
                    <label for="depth">研究深度 (1-5)</label>
                    <input type="number" id="depth" value="2" min="1" max="5">
                </div>
                <div>
                    <button id="submit-btn" onclick="startResearch()">🚀 开始研究</button>
                </div>
            </div>
        </div>

        <div id="status-area"></div>

        <!-- Interactive input (shown during research) -->
        <div id="interactive-area" class="card" style="display:none;">
            <label for="user-input">💬 补充指令（可选 — 研究过程中随时输入）</label>
            <div class="row" style="margin-top: 8px;">
                <textarea id="user-input" rows="2" placeholder="例如：重点看 Sentinel-2 的部分 / 忽略 MODIS / 需要具体公式" style="flex:3;"></textarea>
                <button id="inject-btn" onclick="sendUserInput()" style="flex:1; background:#334155; color:#38bdf8;">📤 发送</button>
            </div>
            <div id="inject-history" style="margin-top: 8px; font-size: 0.85em; color: #64748b;"></div>
        </div>

        <div id="evidence-area"></div>
        <div id="report-area" class="card" style="display:none;">
            <h3 style="color:#38bdf8; margin-bottom:16px;">📄 研究报告</h3>
            <div id="report-content" class="report"></div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000/api/v1';
        let currentTaskId = null;

        function setQuery(q) {
            document.getElementById('query').value = q;
        }

        function setStatus(html, cls) {
            document.getElementById('status-area').innerHTML = `<div class="status ${cls}">${html}</div>`;
        }

        async function sendUserInput() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || !currentTaskId) return;

            try {
                await fetch(`${API}/tasks/${currentTaskId}/input`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                // Show in history
                const history = document.getElementById('inject-history');
                history.innerHTML += `<div>📤 ${text}</div>`;
                input.value = '';
            } catch (e) {
                console.error('Failed to send input:', e);
            }
        }

        // Allow Enter key to send input
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-input')?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendUserInput();
                }
            });
        });

        async function startResearch() {
            const query = document.getElementById('query').value.trim();
            if (!query) { setStatus('❌ 请输入研究问题', 'error'); return; }

            const domain = document.getElementById('domain').value;
            const depth = parseInt(document.getElementById('depth').value);
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;

            document.getElementById('report-area').style.display = 'none';
            document.getElementById('evidence-area').innerHTML = '';
            document.getElementById('inject-history').innerHTML = '';
            document.getElementById('interactive-area').style.display = 'block';
            setStatus('<span class="spinner"></span> 提交中...', 'running');

            try {
                // Submit task
                const resp = await fetch(`${API}/research`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, domain, depth })
                });
                const data = await resp.json();
                currentTaskId = data.task_id;

                // Poll for completion
                setStatus(`<span class="spinner"></span> 研究中... (任务 ${currentTaskId.slice(0,8)}...)`, 'running');

                while (true) {
                    await new Promise(r => setTimeout(r, 3000));
                    const taskResp = await fetch(`${API}/tasks/${currentTaskId}`);
                    const task = await taskResp.json();
                    const phase = task.progress?.phase || '';

                    if (task.status === 'completed') {
                        setStatus(`✅ 研究完成！耗时 ${((task.updated_at ? new Date(task.updated_at) - new Date(task.created_at) : 0) / 1000).toFixed(0)}s`, 'done');
                        document.getElementById('interactive-area').style.display = 'none';
                        await loadReport(currentTaskId);
                        break;
                    } else if (task.status === 'failed') {
                        setStatus(`❌ 失败: ${task.error}`, 'error');
                        document.getElementById('interactive-area').style.display = 'none';
                        break;
                    } else {
                        setStatus(`<span class="spinner"></span> ${phase}...`, 'running');
                    }
                }
            } catch (e) {
                setStatus(`❌ 错误: ${e.message}`, 'error');
            } finally {
                btn.disabled = false;
                currentTaskId = null;
            }
        }

        async function loadReport(taskId) {
            try {
                const resp = await fetch(`${API}/reports/${taskId}`);
                const data = await resp.json();

                // Show report
                document.getElementById('report-content').textContent = data.content_markdown;
                document.getElementById('report-area').style.display = 'block';

                // Show evidence badges
                const ev = data.evidence_summary || {};
                let badges = '';
                for (const [level, count] of Object.entries(ev)) {
                    if (count > 0) badges += `<span class="badge ${level}">${level}: ${count}</span>`;
                }
                document.getElementById('evidence-area').innerHTML = badges ? `<div class="card evidence">${badges}</div>` : '';
            } catch (e) {
                setStatus(`❌ 加载报告失败: ${e.message}`, 'error');
            }
        }
    </script>
</body>
</html>
