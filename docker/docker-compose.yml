# GeoResearch Agent — Docker Compose
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f api    # Follow API logs
#   docker compose down           # Stop all services
#
# Access:
#   API:     http://localhost:8000
#   Swagger: http://localhost:8000/docs
#   Health:  http://localhost:8000/api/v1/health

services:
  # ── FastAPI API Server ────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/georesearch
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    env_file:
      - ../.env
      - ../.env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../configs:/app/configs:ro
      - ../outputs:/app/outputs
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: georesearch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ── Nginx (reverse proxy) ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── Celery Worker (Phase 2) ───────────────────────────────────────
  # Uncomment when Phase 2 (async tasks) is implemented:
  # worker:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.worker
  #   environment:
  #     - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/georesearch
  #     - REDIS_URL=redis://redis:6379/0
  #     - CELERY_BROKER_URL=redis://redis:6379/1
  #   env_file:
  #     - ../.env
  #     - ../.env.local
  #   depends_on:
  #     - db
  #     - redis
  #   volumes:
  #     - ../configs:/app/configs:ro
  #     - ../outputs:/app/outputs
  #     - model-cache:/root/.cache/huggingface
  #   restart: unless-stopped

volumes:
  pgdata:
  redis-data:
  app-data:
  # model-cache:
